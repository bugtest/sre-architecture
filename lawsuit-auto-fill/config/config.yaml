# 民事起诉状自动填写工具 - 配置文件

# 腾讯云 OCR 配置
tencent:
  secret_id: YOUR_TENCENT_SECRET_ID
  secret_key: YOUR_TENCENT_SECRET_KEY
  region: ap-guangzhou

# 阿里云 OCR 配置（如使用）
aliyun:
  access_key_id: YOUR_ACCESS_KEY_ID
  access_key_secret: YOUR_ACCESS_KEY_SECRET
  endpoint: ocr.cn-shanghai.aliyuncs.com

# 大模型配置（用于智能信息提取）
llm:
  provider: aliyun  # aliyun(阿里云百炼)
  api_key: YOUR_DASHSCOPE_API_KEY
  model: qwen-plus  # qwen-plus / qwen-max

# 默认 OCR 模式：local / tencent / hybrid
default_ocr_mode: hybrid

# 默认提取模式：regex / llm
default_extract_mode: regex

# 本地 OCR 配置
local:
  lang: chi_sim+eng
  dpi: 200
  max_pages: 20
