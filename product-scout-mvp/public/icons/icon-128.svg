<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1D4ED8;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  
  <!-- 放大镜 -->
  <circle cx="50" cy="50" r="28" fill="none" stroke="white" stroke-width="8" opacity="0.9"/>
  <line x1="70" y1="70" x2="95" y2="95" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  
  <!-- 产品盒子 -->
  <rect x="35" y="35" width="30" height="30" rx="4" fill="white" opacity="0.3"/>
  <rect x="40" y="40" width="20" height="20" rx="2" fill="white" opacity="0.5"/>
</svg>
